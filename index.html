<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שליחת פקס - InterFAX</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f2f5; min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; padding: 2rem 1rem; direction: rtl;
  }
  .app { width: 100%; max-width: 560px; flex: 1; }
  .header { text-align: center; margin-bottom: 1.5rem; }
  .header h1 { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; }
  .header p { font-size: 0.875rem; color: #6b7280; margin-top: 0.25rem; }
  .card {
    background: #fff; border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 1.75rem; margin-bottom: 1rem;
  }
  .card-title {
    font-size: 0.8rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: #9ca3af; margin-bottom: 1.25rem;
  }
  .field { margin-bottom: 1.1rem; }
  label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.4rem; }
  input[type="text"], input[type="password"], input[type="datetime-local"] {
    width: 100%; padding: 0.65rem 0.875rem;
    border: 1.5px solid #e5e7eb; border-radius: 10px;
    font-size: 0.9rem; color: #111827; background: #f9fafb;
    transition: border-color 0.15s; outline: none;
    direction: ltr; text-align: right;
  }
  input:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
    background: #fff;
  }
  .input-wrap { position: relative; display: flex; align-items: center; }
  .input-wrap input { padding-left: 5rem; }
  .suffix { position: absolute; left: 0.875rem; font-size: 0.85rem; color: #9ca3af; pointer-events: none; }
  .hint { font-size: 0.78rem; color: #9ca3af; margin-top: 0.3rem; }
  .file-zone {
    border: 2px dashed #d1d5db; border-radius: 12px;
    padding: 2rem 1rem; text-align: center;
    cursor: pointer; transition: all 0.2s;
    background: #f9fafb; position: relative;
  }
  .file-zone:hover, .file-zone.drag-over { border-color: #4f46e5; background: #eef2ff; }
  .file-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
  }
  .file-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .file-zone p { font-size: 0.875rem; color: #6b7280; margin: 0; }
  .file-name { font-size: 0.875rem; font-weight: 600; color: #4f46e5; margin-top: 0.5rem; word-break: break-all; }
  .schedule-toggle { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .toggle-btn {
    flex: 1; padding: 0.6rem;
    border: 1.5px solid #e5e7eb; border-radius: 10px;
    font-size: 0.875rem; font-weight: 600;
    cursor: pointer; background: #f9fafb; color: #6b7280; transition: all 0.15s;
  }
  .toggle-btn.active { background: #4f46e5; border-color: #4f46e5; color: #fff; }
  .datetime-field { display: none; }
  .datetime-field.show { display: block; }
  .btn {
    width: 100%; padding: 0.875rem;
    background: #4f46e5; color: #fff;
    border: none; border-radius: 12px;
    font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s; margin-top: 0.5rem;
  }
  .btn:hover:not(:disabled) { background: #4338ca; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.3); }
  .btn:disabled { background: #c4c4cf; cursor: not-allowed; }
  .btn.secondary { background: #f3f4f6; color: #374151; margin-top: 0.5rem; }
  .btn.secondary:hover { background: #e5e7eb; transform: none; box-shadow: none; }
  .spinner {
    display: none; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast {
    display: none; align-items: center; gap: 0.75rem;
    padding: 1rem 1.25rem; border-radius: 12px;
    font-size: 0.9rem; font-weight: 600;
    margin-top: 1rem; animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .toast.success { display: flex; background: #ecfdf5; color: #065f46; border: 1.5px solid #a7f3d0; }
  .toast.error { display: flex; background: #fef2f2; color: #991b1b; border: 1.5px solid #fecaca; }
  .toast-icon { font-size: 1.25rem; flex-shrink: 0; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; background: #eef2ff; color: #4f46e5; margin-right: 0.4rem; }
  .logged-in-bar {
    display: none; align-items: center; justify-content: space-between;
    background: #eef2ff; border-radius: 10px;
    padding: 0.6rem 1rem; margin-bottom: 1rem; font-size: 0.875rem;
  }
  .logged-in-bar span { color: #4f46e5; font-weight: 600; }
  .logout-btn { background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 0.8rem; text-decoration: underline; }
  footer {
    width: 100%; max-width: 560px;
    text-align: center; padding: 1.5rem;
    margin-top: 1rem; font-size: 0.8rem;
    color: #9ca3af; border-top: 1px solid #e5e7eb;
  }
  footer strong { color: #4f46e5; }
  footer a { color: #4f46e5; text-decoration: none; }
  
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>📠 שליחת פקס</h1>
    <p>מחובר ל-InterFAX</p>
  </div>

  <!-- מסך ראשי -->
  <div id="mainApp">

    <div class="card">
      <p class="card-title">קובץ לשליחה</p>
      <div class="file-zone" id="fileZone">
        <input type="file" id="pdfFile" accept=".pdf,application/pdf">
        <div class="file-icon">📄</div>
        <p>גרור PDF לכאן או לחץ לבחירה</p>
        <p class="file-name" id="fileName"></p>
      </div>
    </div>

    <div class="card">
      <p class="card-title">פרטי השליחה</p>
      <div class="field">
        <label for="faxNumber">מספר פקס</label>
        <div class="input-wrap">
          <input type="text" id="faxNumber" placeholder="0391234567" />
          <span class="suffix">@fax.tc</span>
        </div>
        <p class="hint">הכניסי מספר בלבד - הסיומת תתווסף אוטומטית</p>
      </div>
      <div class="field">
        <label for="csid">CSID <span class="tag">טקסט שיופיע במסמך</span></label>
        <input type="text" id="csid" placeholder="שם החברה שלך" maxlength="20"/>
        <p class="hint">עד 20 תווים</p>
      </div>
    </div>

    <div class="card">
      <p class="card-title">תזמון שליחה</p>
      <div class="schedule-toggle">
        <button class="toggle-btn active" id="btnImmediate" onclick="setSchedule('immediate')">⚡ מיידי</button>
        <button class="toggle-btn" id="btnScheduled" onclick="setSchedule('scheduled')">🕐 זמן אחר</button>
      </div>
      <div class="datetime-field" id="datetimeField">
        <label for="sendTime">מועד שליחה</label>
        <input type="datetime-local" id="sendTime" />
      </div>
    </div>

    <button class="btn" id="sendBtn" onclick="sendFax()">
      <span id="btnText">שלח פקס</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="toast success" id="toastSuccess">
      <span class="toast-icon">✅</span>
      <span id="successMsg">הפקס נשלח בהצלחה!</span>
    </div>
    <div class="toast error" id="toastError">
      <span class="toast-icon">❌</span>
      <span id="errorMsg">שגיאה בשליחה</span>
    </div>
  </div>
</div>

<footer>
  אפיון, הקמה וניהול ע"י <strong>SI RO</strong> &nbsp;|&nbsp;
  <a href="mailto:info@sirosystems.com">info@sirosystems.com</a>
</footer>

<script>
const config = {
  username: "KUPOT1",
  password: "bQcHg2bJGuvSNA#",
  replyAddress: "info@sirosystems.com"
};
let scheduleMode = 'immediate';

const fileZone = document.getElementById('fileZone');
const pdfFile = document.getElementById('pdfFile');
const fileName = document.getElementById('fileName');

fileZone.addEventListener('dragover', e => { e.preventDefault(); fileZone.classList.add('drag-over'); });
fileZone.addEventListener('dragleave', () => fileZone.classList.remove('drag-over'));
fileZone.addEventListener('drop', e => {
  e.preventDefault(); fileZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') {
    pdfFile.files = e.dataTransfer.files;
    fileName.textContent = '📎 ' + file.name;
  }
});
pdfFile.addEventListener('change', () => {
  if (pdfFile.files[0]) fileName.textContent = '📎 ' + pdfFile.files[0].name;
});

function setSchedule(mode) {
  scheduleMode = mode;
  document.getElementById('btnImmediate').classList.toggle('active', mode === 'immediate');
  document.getElementById('btnScheduled').classList.toggle('active', mode === 'scheduled');
  document.getElementById('datetimeField').classList.toggle('show', mode === 'scheduled');
}

function showToast(type, msg) {
  document.getElementById('toastSuccess').style.display = 'none';
  document.getElementById('toastError').style.display = 'none';
  if (type === 'success') {
    document.getElementById('successMsg').textContent = msg;
    document.getElementById('toastSuccess').style.display = 'flex';
  } else {
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('toastError').style.display = 'flex';
  }
}

function setLoading(on) {
  const btn = document.getElementById('sendBtn');
  btn.disabled = on;
  document.getElementById('btnText').style.display = on ? 'none' : 'block';
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
}

async function sendFax() {
  const rawNumber = document.getElementById('faxNumber').value.trim().replace(/\D/g, '');
  const faxEmail = rawNumber + '@fax.tc';
  const csid = document.getElementById('csid').value.trim();
  const file = pdfFile.files[0];
  const sendTime = document.getElementById('sendTime').value;

  if (!file) return showToast('error', 'יש לבחור קובץ PDF');
  if (!rawNumber) return showToast('error', 'יש להזין מספר פקס');

  setLoading(true);
  document.getElementById('toastSuccess').style.display = 'none';
  document.getElementById('toastError').style.display = 'none';

  try {
    let url = `https://rest.interfax.net/outbound/faxes?faxNumber=${encodeURIComponent(faxEmail)}`;
    if (csid) url += `&csid=${encodeURIComponent(csid)}`;
    if (config.replyAddress) url += `&replyAddress=${encodeURIComponent(config.replyAddress)}`;
    if (scheduleMode === 'scheduled' && sendTime)
      url += `&postponeTime=${encodeURIComponent(new Date(sendTime).toISOString())}`;

    const fileBuffer = await file.arrayBuffer();
    const credentials = btoa(`${config.username}:${config.password}`);

    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Authorization': `Basic ${credentials}`, 'Content-Type': 'application/pdf' },
      body: fileBuffer
    });

    if (response.status === 201) {
      const location = response.headers.get('Location') || '';
      const faxId = location.split('/').pop();
      const scheduled = scheduleMode === 'scheduled' && sendTime
        ? ` | מתוזמן ל: ${new Date(sendTime).toLocaleString('he-IL')}` : '';
      showToast('success', `הפקס נשלח ל-${faxEmail} | מזהה: ${faxId}${scheduled}`);
    } else {
      const text = await response.text().catch(() => '');
      showToast('error', `שגיאה ${response.status}: ${text || response.statusText}`);
    }
  } catch (err) {
    showToast('error', `שגיאת חיבור: ${err.message}`);
  } finally {
    setLoading(false);
  }
}
</script>
</body>
</html>
